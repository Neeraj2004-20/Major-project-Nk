<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Transformer-Based Market Movement Prediction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eee;
        }
        
        .register-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        
        .register-container {
            background: rgba(22, 33, 62, 0.95);
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .register-header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .register-header p {
            color: #999;
            font-size: 0.95em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #667eea;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #0f3460;
            background: #0f3460;
            color: #eee;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: #16213e;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }
        
        .form-group input::placeholder {
            color: #666;
        }
        
        .password-requirements {
            background: rgba(102, 126, 234, 0.1);
            border-left: 4px solid #667eea;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.85em;
            color: #ccc;
        }
        
        .password-requirements ul {
            list-style: none;
            margin-top: 8px;
        }
        
        .password-requirements li {
            padding: 3px 0;
        }
        
        .password-requirements li::before {
            content: '✓ ';
            color: #27ae60;
            margin-right: 5px;
        }
        
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-register:active {
            transform: translateY(0);
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #666;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #0f3460;
        }
        
        .divider span {
            background: #16213e;
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }
        
        .signin-link {
            text-align: center;
            margin-top: 25px;
            color: #999;
        }
        
        .signin-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        
        .signin-link a:hover {
            color: #764ba2;
        }
        
        .error-message {
            display: none;
            background: rgba(231, 76, 60, 0.2);
            border-left: 4px solid #e74c3c;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #ff6b6b;
            font-size: 0.9em;
        }
        
        .success-message {
            display: none;
            background: rgba(39, 174, 96, 0.2);
            border-left: 4px solid #27ae60;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #52c41a;
            font-size: 0.9em;
        }
        
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85em;
            color: #666;
        }
        
        .footer-link a {
            color: #667eea;
            text-decoration: none;
        }
        
        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <div class="register-container">
            <div class="register-header">
                <h1>Create Account</h1>
                <p>Join the next generation of AI-powered trading</p>
            </div>
            
            <div class="error-message" id="error-msg"></div>
            <div class="success-message" id="success-msg"></div>
            
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="username">Choose Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Enter your desired username"
                        pattern="[a-zA-Z0-9_]{3,20}"
                        title="3-20 characters, alphanumeric and underscore only"
                        required
                        autocomplete="username"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Create a strong password"
                        minlength="6"
                        required
                        autocomplete="new-password"
                        onchange="validatePassword()"
                    >
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        placeholder="Confirm your password"
                        minlength="6"
                        required
                        autocomplete="new-password"
                    >
                </div>
                
                <div class="password-requirements">
                    <strong>Password Requirements:</strong>
                    <ul>
                        <li>Minimum 6 characters</li>
                        <li>Mix of letters and numbers recommended</li>
                        <li>Unique and secure</li>
                    </ul>
                </div>
                
                <button type="submit" class="btn-register">Create Account</button>
            </form>
            
            <div class="divider"><span>or</span></div>
            
            <div class="signin-link">
                Already have an account?<br>
                <a href="login.html">Sign In Here</a>
            </div>
        </div>
        
        <div class="footer-link">
            <a href="/">Back to Home</a>
        </div>
    </div>
    
    <script>
        function validatePassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (confirmPassword && password !== confirmPassword) {
                document.getElementById('confirm-password').style.borderColor = '#e74c3c';
            } else if (confirmPassword) {
                document.getElementById('confirm-password').style.borderColor = '#667eea';
            }
        }
        
        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            // Validate passwords match
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match. Please try again.';
                errorMsg.style.display = 'block';
                return;
            }
            
            // Validate password length
            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters long.';
                errorMsg.style.display = 'block';
                return;
            }
            
            // Validate username
            if (username.length < 3) {
                errorMsg.textContent = 'Username must be at least 3 characters long.';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                let data = {};
                const contentType = response.headers.get('content-type');
                
                if (contentType && contentType.includes('application/json')) {
                    try {
                        data = await response.json();
                    } catch (parseError) {
                        console.error('JSON Parse Error:', parseError);
                        data = { detail: 'Server error - invalid response' };
                    }
                } else {
                    const text = await response.text();
                    console.error('Unexpected response type:', contentType, text);
                    data = { detail: 'Server returned non-JSON response' };
                }
                
                if (response.ok) {
                    successMsg.innerHTML = `✓ Account created successfully!<br>Redirecting to login in 2 seconds...`;
                    successMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorMsg.textContent = data.message || data.detail || 'Registration failed. Status: ' + response.status;
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = 'Registration failed: ' + error.message;
                errorMsg.style.display = 'block';
            }
        }
        
        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                window.location.href = 'index.html';
            }
            
            // Add password validation on input
            document.getElementById('confirm-password').addEventListener('input', validatePassword);
        });
    </script>
</body>
</html>
